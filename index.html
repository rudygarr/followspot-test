<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Follow Spot Test Ground</title>
<style>
  :root { --bg: #000; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    touch-action: none;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    cursor: none;
    font-family: Arial, Helvetica, sans-serif;
  }
  #app { position: fixed; inset: 0; background: var(--bg); }
  #stage { position: absolute; inset: 0; background: var(--bg); }
  #spot {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    will-change: left, top, width, height, opacity, filter, background, box-shadow;
    mix-blend-mode: screen;
  }
  #logo {
    position: fixed;
    right: max(10px, env(safe-area-inset-right));
    bottom: max(10px, env(safe-area-inset-bottom));
    width: min(10vw, 10vh, 110px);
    max-width: 10%;
    opacity: 0.92;
    pointer-events: none;
    z-index: 5;
    filter: drop-shadow(0 0 10px rgba(0,0,0,0.35));
  }
  #hint {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    color: rgba(255,255,255,0.28);
    font-size: clamp(13px, 2vw, 22px);
    line-height: 1.5;
    text-align: center;
    pointer-events: none;
    transition: opacity 180ms ease;
  }
  #hint.hidden { opacity: 0; }
</style>
</head>

  <div id="hint">Click to toggle the spot. Mouse wheel = size. Right mouse + wheel = sharp / soft edge. Number keys = white temperature. Letter keys = color shortcuts.</div>
</div>
<script>
(() => {
  const stage = document.getElementById('stage');
  const spot = document.getElementById('spot');
  const hint = document.getElementById('hint');

  const clamp = (v, min, max) => Math.min(max, Math.max(min, v));
  const lerp = (a, b, t) => a + (b - a) * t;

  const whiteMap = {
    '1': 6000,
    '2': 5625,
    '3': 5250,
    '4': 4875,
    '5': 4500,
    '6': 4200,
    '7': 3900,
    '8': 3600,
    '9': 3300,
    '0': 3000
  };

  const colorShortcuts = {
    r: [255, 42, 42],      // Red
    g: [42, 255, 90],      // Green
    b: [64, 130, 255],     // Blue
    p: [174, 78, 255],     // Purple
    t: [0, 196, 184],      // Teal
    y: [255, 235, 59],     // Yellow
    o: [255, 150, 40],     // Orange
    c: [0, 232, 255],      // Cyan
    m: [255, 60, 208],     // Magenta
    l: [166, 255, 0],      // Lime
    a: [255, 191, 0],      // Amber
    v: [143, 96, 255],     // Violet
    i: [95, 82, 255],      // Indigo
    n: [40, 68, 168],      // Navy
    s: [192, 192, 192],    // Silver
    f: [255, 0, 166],      // Fuchsia
    w: null                // White (special case)
  };

  function kelvinToRgb(kelvin) {
    let temp = kelvin / 100;
    let red, green, blue;
    if (temp <= 66) {
      red = 255;
      green = 99.4708025861 * Math.log(temp) - 161.1195681661;
      if (temp <= 19) {
        blue = 0;
      } else {
        blue = 138.5177312231 * Math.log(temp - 10) - 305.0447927307;
      }
    } else {
      red = 329.698727446 * Math.pow(temp - 60, -0.1332047592);
      green = 288.1221695283 * Math.pow(temp - 60, -0.0755148492);
      blue = 255;
    }
    return [
      clamp(Math.round(red), 0, 255),
      clamp(Math.round(green), 0, 255),
      clamp(Math.round(blue), 0, 255)
    ];
  }

  const state = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2,
    visible: false,
    sizePct: 0.18,
    targetSizePct: 0.18,
    softness: 0.65,       // 0 = razor sharp, 1 = very soft
    targetSoftness: 0.65,
    kelvin: 4500,
    targetKelvin: 4500,
    colorMode: 'white',   // white|rgb
    rgb: [255,255,255],
    rightDown: false,
    fullscreenRequested: false,
    activeTouches: new Map(),
    touchOrder: [],
    firstTouchId: null,
    secondTouchId: null,
    thirdTouchId: null,
    secondStartY: null,
    secondBaseSizePct: null,
    thirdStartX: null,
    thirdStartY: null,
    thirdBaseKelvin: null,
    thirdBaseSoftness: null,
  };

  function getScreenMin() {
    return Math.min(window.innerWidth, window.innerHeight);
  }

  function getColor() {
    return state.colorMode === 'rgb' ? state.rgb : kelvinToRgb(state.kelvin);
  }

  function updateHint() {
    if (state.visible || document.fullscreenElement) hint.classList.add('hidden');
  }

  async function enterFullscreenMaybe() {
    if (state.fullscreenRequested) return;
    state.fullscreenRequested = true;
    try {
      if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
        await document.documentElement.requestFullscreen();
      }
    } catch (_) {}
  }

  function setPosition(x, y) {
    state.x = clamp(x, 0, window.innerWidth);
    state.y = clamp(y, 0, window.innerHeight);
  }

  function setVisible(v) {
    state.visible = v;
    updateHint();
  }

  function solidSpotStyle(r, g, b) {
    // Completely solid, no ring/donut, no outer softness.
    return {
      background: `rgb(${r}, ${g}, ${b})`,
      filter: 'none',
      boxShadow: 'none'
    };
  }

  function softSpotStyle(r, g, b, d, softness) {
    // Large solid center with feather only near the edge.
    const solidEdge = 97 - (softness * 42);      // strong center, prevents donut look
    const fadeOne = Math.min(99, solidEdge + 4 + softness * 8);
    const fadeTwo = Math.min(100, fadeOne + 10 + softness * 12);
    const blurPx = Math.max(0.6, d * (0.006 + softness * 0.11));
    const glowPx = Math.max(0, d * (softness * 0.16));
    return {
      background: `radial-gradient(circle, rgba(${r}, ${g}, ${b}, 1) 0%, rgba(${r}, ${g}, ${b}, 1) ${solidEdge}%, rgba(${r}, ${g}, ${b}, 0.60) ${fadeOne}%, rgba(${r}, ${g}, ${b}, 0.14) ${fadeTwo}%, rgba(${r}, ${g}, ${b}, 0) 100%)`,
      filter: `blur(${blurPx}px)`,
      boxShadow: glowPx > 0 ? `0 0 ${glowPx}px rgba(${r}, ${g}, ${b}, 0.22)` : 'none'
    };
  }

  function render() {
    state.sizePct = lerp(state.sizePct, state.targetSizePct, 0.12);
    state.softness = lerp(state.softness, state.targetSoftness, 0.14);
    state.kelvin = lerp(state.kelvin, state.targetKelvin, 0.12);

    const visible = state.visible;
    const d = getScreenMin() * clamp(state.sizePct, 0.0, 0.50);
    const [r, g, b] = getColor();

    spot.style.left = `${state.x}px`;
    spot.style.top = `${state.y}px`;
    spot.style.width = `${d}px`;
    spot.style.height = `${d}px`;
    spot.style.opacity = (visible && d > 1) ? '1' : '0';

    const style = state.softness <= 0.02
      ? solidSpotStyle(r, g, b)
      : softSpotStyle(r, g, b, d, state.softness);

    spot.style.background = style.background;
    spot.style.filter = style.filter;
    spot.style.boxShadow = style.boxShadow;

    requestAnimationFrame(render);
  }

  // Mouse
  stage.addEventListener('contextmenu', (e) => e.preventDefault());

  stage.addEventListener('mousedown', async (e) => {
    await enterFullscreenMaybe();
    if (e.button === 2) {
      state.rightDown = true;
      return;
    }
    if (e.button === 0) {
      setPosition(e.clientX, e.clientY);
      setVisible(!state.visible);
      if (state.visible && state.targetSizePct < 0.05) {
        state.targetSizePct = 0.18;
      }
    }
  });

  window.addEventListener('mouseup', (e) => {
    if (e.button === 2) state.rightDown = false;
  });

  stage.addEventListener('mousemove', (e) => {
    if (state.visible) setPosition(e.clientX, e.clientY);
  });

  stage.addEventListener('wheel', (e) => {
    if (!state.visible) return;
    e.preventDefault();
    if (state.rightDown) {
      // up = sharper, down = softer
      state.targetSoftness = clamp(state.targetSoftness + (e.deltaY * 0.0011), 0, 1);
    } else {
      // up = bigger, down = smaller
      state.targetSizePct = clamp(state.targetSizePct - (e.deltaY * 0.00028), 0.05, 0.50);
    }
  }, { passive: false });

  window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (key in whiteMap) {
      state.colorMode = 'white';
      state.targetKelvin = whiteMap[key];
      if (!state.visible) setVisible(true);
      return;
    }

    if (key in colorShortcuts) {
      if (key === 'w') {
        state.colorMode = 'white';
        state.targetKelvin = 4500;
      } else {
        state.colorMode = 'rgb';
        state.rgb = colorShortcuts[key];
      }
      if (!state.visible) setVisible(true);
      return;
    }
  });

  // Touch
  function syncTouchRoles() {
    state.firstTouchId = state.touchOrder[0] ?? null;
    state.secondTouchId = state.touchOrder[1] ?? null;
    state.thirdTouchId = state.touchOrder[2] ?? null;
  }

  function touchById(id) {
    return state.activeTouches.get(id) || null;
  }

  stage.addEventListener('touchstart', async (e) => {
    e.preventDefault();
    await enterFullscreenMaybe();

    for (const t of e.changedTouches) {
      state.activeTouches.set(t.identifier, { x: t.clientX, y: t.clientY });
      if (!state.touchOrder.includes(t.identifier)) state.touchOrder.push(t.identifier);
    }
    syncTouchRoles();

    const first = touchById(state.firstTouchId);
    if (first && !state.visible) {
      setPosition(first.x, first.y);
      if (state.targetSizePct < 0.05) state.targetSizePct = 0.18;
      setVisible(true);
    }

    const second = touchById(state.secondTouchId);
    if (second) {
      state.secondStartY = second.y;
      state.secondBaseSizePct = state.targetSizePct;
    }

    const third = touchById(state.thirdTouchId);
    if (third) {
      state.thirdStartX = third.x;
      state.thirdStartY = third.y;
      state.thirdBaseKelvin = state.targetKelvin;
      state.thirdBaseSoftness = state.targetSoftness;
    }
  }, { passive: false });

  stage.addEventListener('touchmove', (e) => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (state.activeTouches.has(t.identifier)) {
        state.activeTouches.set(t.identifier, { x: t.clientX, y: t.clientY });
      }
    }
    syncTouchRoles();

    const first = touchById(state.firstTouchId);
    if (first && state.visible) {
      setPosition(first.x, first.y); // always anchored to first finger
    }

    const second = touchById(state.secondTouchId);
    if (first && second && state.secondStartY !== null) {
      const dy = second.y - state.secondStartY;
      let nextSize = state.secondBaseSizePct - (dy * 0.00055);
      nextSize = clamp(nextSize, 0.0, 0.50);
      state.targetSizePct = nextSize;
      if (nextSize <= 0.003) setVisible(false);
      else if (!state.visible) setVisible(true);
    }

    const third = touchById(state.thirdTouchId);
    if (first && third && state.thirdStartX !== null && state.thirdStartY !== null) {
      const dx = third.x - state.thirdStartX;
      const dy = third.y - state.thirdStartY;
      state.colorMode = 'white';
      state.targetKelvin = clamp(state.thirdBaseKelvin + dx * 5.2, 3000, 6000);
      state.targetSoftness = clamp(state.thirdBaseSoftness + dy * 0.0022, 0, 1);
    }
  }, { passive: false });

  function cleanupEndedTouches(changedTouches) {
    for (const t of changedTouches) {
      state.activeTouches.delete(t.identifier);
      state.touchOrder = state.touchOrder.filter(id => id !== t.identifier);
    }
    syncTouchRoles();

    const second = touchById(state.secondTouchId);
    if (second) {
      state.secondStartY = second.y;
      state.secondBaseSizePct = state.targetSizePct;
    } else {
      state.secondStartY = null;
      state.secondBaseSizePct = null;
    }

    const third = touchById(state.thirdTouchId);
    if (third) {
      state.thirdStartX = third.x;
      state.thirdStartY = third.y;
      state.thirdBaseKelvin = state.targetKelvin;
      state.thirdBaseSoftness = state.targetSoftness;
    } else {
      state.thirdStartX = null;
      state.thirdStartY = null;
      state.thirdBaseKelvin = null;
      state.thirdBaseSoftness = null;
    }
  }

  stage.addEventListener('touchend', (e) => {
    e.preventDefault();
    cleanupEndedTouches(e.changedTouches);
  }, { passive: false });

  stage.addEventListener('touchcancel', (e) => {
    e.preventDefault();
    cleanupEndedTouches(e.changedTouches);
  }, { passive: false });

  window.addEventListener('resize', () => {
    state.x = clamp(state.x, 0, window.innerWidth);
    state.y = clamp(state.y, 0, window.innerHeight);
  });

  requestAnimationFrame(render);
})();
</script>
</body>
</html>
